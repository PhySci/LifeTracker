# fly.toml app configuration file generated for daytiles on 2026-04-27T19:40:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'daytiles'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  ENVIRONMENT = 'production'
  HOST = '127.0.0.1'
  PORT = '8000'
  RELOAD = 'false'

[[mounts]]
  source = 'lifetracker_data'
  destination = '/data'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
